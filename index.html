<html>
<head>
  <meta charset="UTF-8">
  <title>Mekanik Panel</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h1>Rina Roleplay Mekanik Arayüzü</h1>
  <div class="container">
    <div class="panel">
      <h2>Yağ Hesaplama</h2>
      <label>Mevcut Seviye (0–100):
        <input type="number" id="oilLevel" min="0" max="100" value="50">
      </label>
      <label>Toplam Kapasite (litre):
        <input type="number" id="oilCapacity" min="1" value="5">
      </label>
      <button onclick="calculateOil()">Eksik Yağı Hesapla</button>
      <p><strong>Gerekli Yağ:</strong> <span id="oilResult">0</span> litre</p>
      <p><strong>Gerekli Yüzde:</strong> <span id="oilPercent">0</span>%</p>
    </div>
    
    <div class="panel">
      <h2>Stok Durumu</h2>
      <label>%100 Yağ Adedi: <input type="number" id="stock100" min="0" value="1"></label>
      <label>%50 Yağ Adedi: <input type="number" id="stock50" min="0" value="2"></label>
      <label>%25 Yağ Adedi: <input type="number" id="stock25" min="0" value="3"></label>
      <label>%15 Yağ Adedi: <input type="number" id="stock15" min="0" value="4"></label>
      <label>%5 Yağ Adedi: <input type="number" id="stock5" min="0" value="5"></label>
    </div>
    
    <div class="panel">
      <h2>Yağ Ürünleri ile Doldurma</h2>
      <label>Gerekli Yağ (%):
        <input type="number" id="targetOil" min="1" max="100" value="37">
      </label>
      <button onclick="showOilCombo()">Kombinasyonu Göster.</button>
      <p><strong>Önerilen Kombinasyon:</strong> <span id="comboResult"></span></p>
      <p><strong>Eksik Kalan:</strong> <span id="comboLeftover"></span>%</p>
    </div>
    
    <div class="panel">
      <h2>Binek Araç Maliyeti</h2>
      <button onclick="calculateCost('binek')">Maliyeti Hesapla</button>
      <p><strong>Toplam Maliyet:</strong> <span id="costBinek">0</span> ₺</p>
    </div>
    
    <div class="panel">
      <h2>Meslek Araç Maliyeti</h2>
      <button onclick="calculateCost('meslek')">Maliyeti Hesapla</button>
      <p><strong>Toplam Maliyet:</strong> <span id="costMeslek">0</span> ₺</p>
    </div>

    <script src="mekanik.js"></script>
</body>
</html>
